<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OeufTracker — Schéma interactif</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:#2a3248;
    --text:#e8eaf0;--muted:#8891aa;--accent:#f5c842;
    --teal:#2dd4bf;--coral:#fb7185;--amber:#fbbf24;
    --blue:#60a5fa;--purple:#a78bfa;--gray:#94a3b8;--green:#4ade80;
    --panel-w:400px;--header-h:110px;
  }
  body.light {
    --bg:#f4f6f8;--bg2:#ffffff;--bg3:#eef0f4;--border:#d0d5e0;
    --text:#1a1f2e;--muted:#6b7494;--accent:#c49a00;
    --teal:#0f9688;--coral:#e03050;--amber:#b07800;
    --blue:#2563eb;--purple:#6d3fcf;--gray:#4a5568;--green:#15803d;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s;}

  header{padding:14px 28px 0;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;transition:background .25s,border-color .25s;}
  .header-top{display:flex;align-items:center;gap:16px;margin-bottom:10px;}
  .logo{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--accent);}
  .logo span{color:var(--text);font-weight:300;}
  .subtitle{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .header-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .hint{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;background:var(--bg3);border:1px solid var(--border);padding:5px 10px;border-radius:6px;}
  .hint span{color:var(--accent);}
  .theme-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Mono',monospace;transition:all .15s;display:flex;align-items:center;gap:6px;}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent);}

  .legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 0 12px;align-items:center;}
  .leg-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-right:4px;}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;background:var(--bg3);border:1px solid var(--border);padding:3px 8px;border-radius:20px;}
  .leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .leg-sep{width:1px;height:14px;background:var(--border);}
  .leg-line-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
  .leg-line{width:18px;height:0;border-top:1.5px solid;flex-shrink:0;}

  .layout{display:flex;height:calc(100vh - var(--header-h));}
  .schema-wrap{flex:1;overflow:auto;padding:24px 32px;display:flex;justify-content:center;align-items:flex-start;transition:margin-right .35s cubic-bezier(.4,0,.2,1);}
  .schema-wrap.panel-open{margin-right:var(--panel-w);}
  
  svg.schema{width:100%;max-width:600px;height:auto;}
  .node{cursor:pointer;}
  .node rect,.node polygon{transition:filter .15s;}
  .node:hover rect,.node:hover polygon{filter:brightness(1.12);}
  .node.active rect{stroke-width:2.5!important;}

  /* PANEL DROITE */
  .panel{position:fixed;right:0;top:var(--header-h);width:var(--panel-w);height:calc(100vh - var(--header-h));background:var(--bg2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1),background .25s,border-color .25s;overflow-y:auto;z-index:50;}
  .panel.open{transform:translateX(0);}
  .panel-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1;transition:background .25s,border-color .25s;}
  .panel-tag{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:8px;display:inline-block;letter-spacing:.5px;}
  .panel-title{font-size:16px;font-weight:700;line-height:1.2;margin-bottom:4px;}
  .panel-step{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
  .panel-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .panel-close:hover{color:var(--text);border-color:var(--text);}
  .panel-body{padding:18px 20px 28px;}

  /* ILLUSTRATION COMPOSANT */
  .comp-illustration{width:100%;height:140px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .comp-illustration svg{max-width:90%;max-height:90%;}

  .section{margin-bottom:20px;}
  .section-label{font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .section p{font-size:13px;line-height:1.75;color:var(--muted);}
  .section p strong{color:var(--text);font-weight:600;}
  .material-list{list-style:none;margin-top:6px;}
  .material-list li{font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:8px;}
  .material-list li:last-child{border-bottom:none;}
  .material-list li::before{content:'•';color:var(--accent);font-size:14px;}
  .wiring-table{width:100%;border-collapse:collapse;font-size:11.5px;font-family:'DM Mono',monospace;margin-top:4px;}
  .wiring-table th{text-align:left;padding:5px 8px;background:var(--bg3);color:var(--muted);font-weight:500;font-size:9.5px;letter-spacing:.5px;border-bottom:1px solid var(--border);}
  .wiring-table td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text);}
  .wiring-table tr:last-child td{border-bottom:none;}
  .pin-from{color:var(--accent)!important;}
  .pin-to{color:var(--teal)!important;}
  .pin-bus{font-size:9.5px;padding:1px 6px;border-radius:4px;font-weight:500;white-space:nowrap;}
  .bus-spi{background:#1e3a5f44;color:#60a5fa;border:1px solid #60a5fa44;}
  .bus-i2c{background:#2d1f3d44;color:#a78bfa;border:1px solid #a78bfa44;}
  .bus-dig{background:#1a332044;color:#4ade80;border:1px solid #4ade8044;}
  .bus-usb{background:#2a201044;color:#fbbf24;border:1px solid #fbbf2444;}
  .bus-wifi{background:#0f2d2944;color:#2dd4bf;border:1px solid #2dd4bf44;}
  .bus-pwr{background:#2a1a1a44;color:#fb7185;border:1px solid #fb718544;}
  .warn{background:var(--bg3);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:8px 12px;font-size:11.5px;color:var(--amber);margin-top:8px;font-family:'DM Mono',monospace;line-height:1.6;}
  .code-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);line-height:1.8;overflow-x:auto;}
  .code-comment{color:var(--muted);}
  .code-key{color:var(--blue);}
  .code-val{color:var(--teal);}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg2);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo">Oeuf<span>Tracker</span></div>
      <div class="subtitle">Club Maker — Savoirs Vivants — Haguenau</div>
    </div>
    <div class="header-actions">

</header>

let isLight = false;

  isLight = !isLight;

let chatOpen = false;
let chatHistory = [];
let chatBusy = false;

const SYSTEM_PROMPT = `Tu es un assistant pédagogique bienveillant et encourageant pour des enfants et adolescents de 8 à 15 ans qui participent au Club Maker de l'association Savoirs Vivants à Haguenau.

Ton rôle est de les aider à comprendre le projet OeufTracker : une chaîne de tri d'œufs utilisant des microcontrôleurs ESP32 (FireBeetle), des modules RFID (RC522 en SPI et PN532 en I2C), une balance HX711, des bras robotiques à 4 servomoteurs pilotés par Arduino Nano et Makey Makey, un servomoteur 360° pour le tapis roulant, un capteur ultrason HC-SR04, et une communication WiFi entre les modules.

Étapes de la chaîne :
① Arrivée usine : scan manuel RC522, enregistrement poulailler + type élevage
② Entrée chaîne : bras robotique 1 passe le panier devant le PN532 (auto)
③ Sortie chaîne : RC522 auto + pesée HX711 (Petit/Moyen/Gros) + LED RGB
④ Départ usine : PN532 auto, scan final sur Codey Rocky

Tes règles :
- Langage simple et adapté aux 8-15 ans
- Encourageant, jamais de jugement, valorise chaque question
- Réponses courtes : 3-5 phrases maximum
- Analogies concrètes du quotidien pour les concepts techniques
- Émojis avec modération
- Question de relance possible pour vérifier la compréhension
- Toujours en français`;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').classList.toggle('open', chatOpen);
  document.getElementById('schemaWrap').classList.toggle('chat-open', chatOpen);
  document.getElementById('chatToggle').textContent = chatOpen ? '✕ Fermer' : '💬 Aide';
}

function askSuggestion(btn) {
  document.getElementById('chatInput').value = btn.textContent;
  sendMessage();
}

function addMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar ' + role;
  avatar.textContent = role === 'bot' ? '🎓' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="msg-avatar bot">🎓</div><div class="msg-bubble"><div class="chat-typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (chatBusy) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '34px';
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  chatBusy = true;
  document.getElementById('chatSend').disabled = true;
  document.getElementById('chatSuggestions').style.display = 'none';
  addTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.content?.[0]?.text || "Désolé, je n'ai pas pu répondre. Réessaie !";
    chatHistory.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);
  } catch (err) {
    removeTyping();
    addMessage('bot', "Oups, problème de connexion. Réessaie dans un moment ! 🔌");
  }
  chatBusy = false;
  document.getElementById('chatSend').disabled = false;
}

const PYTHON_CODE = `<span class="code-comment"># Pilotage_python.py — lancer avec Thonny</span>
<span class="code-key">import</span> serial, keyboard, time

PORT = <span class="code-val">"COM12"</span>  <span class="code-comment"># adapter selon le port</span>
BAUD = <span class="code-val">9600</span>

arduino = serial.Serial(PORT, BAUD)
time.sleep(<span class="code-val">2</span>)

<span class="code-comment"># Flèches (Makey Makey) → R/L/U/D</span>
<span class="code-comment"># Z/Q → coude haut/bas</span>
<span class="code-comment"># S → fermer pince  O → ouvrir pince</span>
<span class="code-comment"># R → position home</span>
<span class="code-comment"># Broches Arduino : Base=9 Épaule=10 Coude=11 Pince=12</span>`;

let activeNode = null;

function showInfo(id) {
  const d = DATA[id];
  if (!d) return;
  if (activeNode) document.getElementById('n-'+activeNode)?.classList.remove('active');
  activeNode = id;
  document.getElementById('n-'+id)?.classList.add('active');

  const tag = document.getElementById('panelTag');
  tag.textContent = d.tag;
  tag.style.cssText = `background:${d.color}22;color:${d.color};border:1px solid ${d.color}44`;
  const title = document.getElementById('panelTitle');
  title.textContent = d.tag;
  title.style.color = d.color;
  document.getElementById('panelStep').textContent = d.step;

  let html = '';

  // Illustration SVG
  const illuKey = COMP_ILLUSTRATION[id];
  const illuSVG = ILLUSTRATIONS[illuKey];
  if (illuSVG) {
    html += `<div class="comp-illustration">${illuSVG}</div>`;
  }

  // Rôle
  html += `<div class="section"><div class="section-label">À quoi ça sert ?</div><p>${d.role}</p></div>`;
  // Fonctionnement
  html += `<div class="section"><div class="section-label">Comment ça fonctionne ?</div><p>${d.how}</p></div>`;
  // Code Python
  if (d.code) {
    html += `<div class="section"><div class="section-label">Script Python (Thonny)</div>
    <div class="code-block">${PYTHON_CODE}</div>
    <p style="font-size:11px;color:var(--muted);margin-top:6px;font-family:'DM Mono',monospace">Adapter le numéro de port COM dans le code.</p></div>`;
  }
  // Matériel
  if (d.material?.length) {
    html += `<div class="section"><div class="section-label">Matériel nécessaire</div><ul class="material-list">`;
    d.material.forEach(m => { html += `<li>${m}</li>`; });
    html += `</ul></div>`;
  }
  // Câblage
  if (d.wiring?.length) {
    html += `<div class="section"><div class="section-label">Comment brancher ?</div>
    <table class="wiring-table"><thead><tr><th>Broche / module</th><th>→ Connecter à</th><th>Type</th></tr></thead><tbody>`;
    d.wiring.forEach(w => {
      const b = BUS[w.bus] || {label:w.bus,cls:''};
      html += `<tr><td class="pin-from">${w.from}</td><td class="pin-to">${w.to}</td><td><span class="pin-bus ${b.cls}">${b.label}</span></td></tr>`;
    });
    html += `</tbody></table>`;
    if (d.warn) html += `<div class="warn">${d.warn}</div>`;
    html += `</div>`;
  }

  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('infoPanel').classList.add('open');
  document.getElementById('schemaWrap').classList.add('panel-open');
}

function closePanel() {
  document.getElementById('infoPanel').classList.remove('open');
  document.getElementById('schemaWrap').classList.remove('panel-open');
  if (activeNode) { document.getElementById('n-'+activeNode)?.classList.remove('active'); activeNode = null; }
}

function updateHeaderHeight() {
  const h = document.querySelector('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h+'px');
}
window.addEventListener('load', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);
</script>
</body>
</html>
